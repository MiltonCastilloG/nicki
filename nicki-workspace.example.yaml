# Nicki workspace registry — example stub
# Copy to your workspace root as nicki-workspace.yaml and edit.

version: 1

# Path to this workspace (optional; defaults to directory containing this file)
# workspace_path: ~/NickiWorkspace

# Nicki runtime version installed into managed projects
# nicki_runtime_version: 0.1.0

projects:
  # Nicki self-tasks (workspace repo itself)
  nicki:
    path: .
    git:
      default_branch: main
      remote: origin
    # Paths copied from workspace root into each new nicki worktree (glob * supported)
    copy:
      - .env
      - .env.*
      - node_modules
    post_create: []

  castlemill-landing:
    url: git@github.com:your-org/castlemill-landing.git
    path: projects/castlemill-landing
    git:
      default_branch: main
      remote: origin
    copy:
      - .env
      - .env.*
      - node_modules
    post_create:
      - npm install
    gitignore:
      - worktrees/
      - docs/archive/

  tetris-clone-frp:
    url: git@github.com:your-org/tetris-clone-frp.git
    path: projects/tetris-clone-frp
    git:
      default_branch: master
      remote: origin
    copy:
      - .env
      - .env.*
      - node_modules
    post_create:
      - pnpm install
    gitignore:
      - worktrees/
      - docs/archive/

  project-psychic-lemon:
    url: git@github.com:your-org/project-psychic-lemon.git
    path: projects/project-psychic-lemon
    git:
      default_branch: main
      remote: origin
    copy:
      - .env
      - .env.*
      - node_modules
    post_create:
      - pnpm install
    gitignore:
      - worktrees/
      - docs/archive/

