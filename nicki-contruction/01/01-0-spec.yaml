meta:
  worktree: review-routing
  generated_by: spec-maker
  task: 01-0 track — nicki-contruction/01/01-0-stories.md. Slice 00 JSON status baseline.

title: Review loop and orchestration routing
type: refactor

summary: >
  Post-execute review loop → machine routing on slice 00 status. Triage emits readiness
  in validation YAML. Nicki reads disk — not review prose, not chat. Fix loop append
  subtasks keep [x]. Acceptance gates commit. Partial review_scope needs confirm. Spec
  open_questions block subtask-maker.

requirements:
  - id: readiness-block
    description: >
      Triage writes validation readiness.status (ready_for_acceptance | fix_required |
      rerun_review | blocked), recommended_next_step, blockers. Blockers non-empty only
      for fix_required or blocked. status.json validation pointer updates after triage.
  - id: nicki-readiness-routing
    description: >
      Nicki + resume read readiness via status pointer. No commit-task when fix_required
      or blocked. No infer next step from review markdown.
  - id: fix-loop
    description: >
      fix_required → append fix subtasks (one line each, keep [x], ref validation path).
      Rerun execute/review/triage; status history records iteration.
  - id: acceptance-gate
    description: >
      ready_for_acceptance → Nicki-only checkpoint, disk summary, no commit until accept.
      Reject → update blockers, route fix or describe.
  - id: partial-review
    description: >
      All subtasks done or no review_scope → full review. partial mode → user confirm,
      scope limits findings, no commit without full readiness.
  - id: spec-open-questions
    description: >
      Non-empty spec open_questions → block subtask-maker, mirror in status. Cleared →
      advance to subtasks.

scope:
  in:
    - validation-format readiness, review-triage writer, Nicki routing table
    - fix-loop append, acceptance checkpoint, spec gate, status pointers/history
  out:
    - 01-1 (publish, paths, docs), handoff JSON conversion, host app, registry leaf writes

constraints:
  - no-new-deps
  - nicki-read-only-orchestrator
  - leaf-agents-atomic
  - parallel-with-01-1
  - global-registry-start-close-only
  - status-update-writes-per-task-only

acceptance:
  - Readiness block + pointer rules match 01-0-stories
  - Nicki routes from disk; commit blocked per readiness enum
  - Fix loop preserves [x]; acceptance gates commit; partial scope needs confirm
  - Spec open_questions gate blocks then clears

assumptions:
  - Slice 00 JSON status shipped; 01-0-stories.md = Gherkin source
  - Nicki owns acceptance; commit-task = separate leaf + git confirm

open_questions: []
